<!DOCTYPE html>
<html>
<head>
    <title>FearBlocker</title>
    <link rel="stylesheet" href="css/bootstrap.css">
    <script src="js/bootstrap.js"></script>
    <link rel="stylesheet" href="css/popup.css">
    <link rel="stylesheet" href="css/tags.css">
    <link rel="stylesheet" href="css/slider.css">
</head>

<body>
    <div class='header' width='100%'>
        <span class="header-title">PhobiaBlocker</span>
        <button id="open-settings-btn" class="header-settings-btn" title="Settings">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
                <path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94L14.4 2.81c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/>
            </svg>
        </button>
    </div>
    <div class="main-area">
        <div id="detected-words-container" class="main-area-container">
            <div class="suported-words-collapser">
                <h3>
                    Detected on this page
                    <span class="info-icon" data-tooltip="Counts all elements matching your phobia words, including hidden ones. The number may differ from what appears visually on screen, since hidden elements might not be rendered. Only normalized words count is shown, all infliction of a word counted same as one normalized word">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <text x="8" y="12" text-anchor="middle" font-size="11" font-weight="bold" fill="currentColor">i</text>
                        </svg>
                    </span>
                </h3>
                <span id="btn-detected-words" data-bs-toggle="collapse" data-bs-target="#detected-words-area" aria-expanded="false" aria-controls="detected-words-area"></span>
            </div>
            <div id="detected-words-area" class="collapse">
                <div id="detected-words-list"></div>
            </div>
        </div>
        <div class="main-area-container settings-contianer">
            <div class="setting-info">
                <h3>
                    Text Analyzer
                    <span class="info-icon" data-tooltip="This option scans the page for words that trigger your phobias. This is the most important feature of the app. Because it works hard to keep you safe, it runs best on a standard or newer computer (it might be slow on very basic, low-budget PCs).">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <text x="8" y="12" text-anchor="middle" font-size="11" font-weight="bold" fill="currentColor">i</text>
                        </svg>
                    </span>
                </h3>
            </div>
            <label class="switch">
                <input type="checkbox" id="enabled-switch">
                <span class="slider round"></span>
            </label>
        </div>
        <div class="main-area-container settings-contianer">
            <div class="setting-info">
                <h3>
                    Blur Always On
                    <span class="info-icon" data-tooltip="Blur all visual content without text analysis for maximum protection (Performance impact: None to Small)">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <text x="8" y="12" text-anchor="middle" font-size="11" font-weight="bold" fill="currentColor">i</text>
                        </svg>
                    </span>
                </h3>
            </div>
            <label class="switch">
                <input type="checkbox" id="blurIsAlwaysOn-switch">
                <span class="slider round"></span>
            </label>
        </div>
        <div class="main-area-container">
            <h3>Manual Controls</h3>
            <div class="blur-btn-group">
                <div class="blur-btn-container">
                    <button class="blur-btn blur-action-btn" id="blurBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="3"/>
                            <path d="M12 5v.01M12 18.99v.01M5 12h.01M18.99 12h.01M7.05 7.05l.01.01M16.94 16.94l.01.01M7.05 16.94l.01.01M16.94 7.05l.01.01"/>
                        </svg>
                        <span>Blur All</span>
                    </button>
                    <button class="unblur-btn blur-action-btn" id="unblurBtn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
                            <circle cx="12" cy="12" r="3"/>
                        </svg>
                        <span>Unblur All</span>
                    </button>
                </div>
            </div>
        </div>
        <div class="main-area-container">
            <h3>
                Blur Amount
                <span class="info-icon" data-tooltip="Adjust the intensity of the blur effect applied to visual content">
                    <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                        <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                        <text x="8" y="12" text-anchor="middle" font-size="11" font-weight="bold" fill="currentColor">i</text>
                    </svg>
                </span>
            </h3>
            <input type="range" id="blurRange" min="0" max="100" step="1" width="100%">
        </div>
        <div class="supported-words-container main-area-container">
            <div class="suported-words-collapser">
                <h3>
                    Target Words To Block
                    <span class="info-icon" data-tooltip="Words related to your phobias that trigger content blurring.">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="currentColor">
                            <circle cx="8" cy="8" r="7" stroke="currentColor" stroke-width="1.5" fill="none"/>
                            <text x="8" y="12" text-anchor="middle" font-size="11" font-weight="bold" fill="currentColor">i</text>
                        </svg>
                    </span>
                </h3>
                <span name="supportedWords" id="btn-supported-words" data-bs-toggle="collapse" data-bs-target="#supported-words-area" aria-expanded="false" aria-controls="div-supported-words"></span>
            </div>
            <div id="supported-words-area" class="collapse">
                <div id="tags-container" class="tags-container"></div>
                <div class="add-word-input-container">
                    <input type="text" id="word-input" class="word-input" placeholder="Add a word..." maxlength="30">
                    <button id="addTagBtn" class="add-word-btn">
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
                            <path d="M8 3V13M3 8H13" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
        <script src="js/popup.js"></script>
    </div>
</body>
</html>
